root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main.exe ./cmd"
bin = "tmp/main.exe"
full_bin = "tmp/main.exe"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", ".git"]
delay = 500
stop_on_error = true

[log]
time = true

[color]
main    = "red"
watcher = "yellow"
build   = "magenta"
runner  = "green"

[misc]
clean_on_exit = true